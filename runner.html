<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진화 러너</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;font-family:sans-serif;padding:12px 0;overflow:hidden;}
#backBtn{position:fixed;top:12px;left:12px;padding:7px 16px;font-size:13px;border-radius:8px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);cursor:pointer;text-decoration:none;z-index:100;}
#backBtn:hover{background:rgba(255,255,255,0.18);}
#ui{display:flex;justify-content:space-between;align-items:center;width:480px;padding:6px 14px;font-size:13px;color:#ccc;background:rgba(255,255,255,0.05);border-radius:8px;border:0.5px solid rgba(255,255,255,0.12);margin-bottom:8px;}
#wrap{position:relative;width:480px;}
#gameCanvas{display:block;border-radius:12px;border:0.5px solid rgba(255,255,255,0.1);}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);border-radius:12px;color:white;gap:14px;}
#overlay h2{font-size:24px;font-weight:700;}
#overlay p{font-size:13px;color:rgba(255,255,255,0.6);text-align:center;line-height:2;}
#startBtn{padding:10px 32px;font-size:14px;border-radius:8px;border:1px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.15);color:white;cursor:pointer;}
#startBtn:hover{background:rgba(255,255,255,0.25);}
</style>
</head>
<body>
<a href="index.html" id="backBtn">← 메인으로</a>
<div id="ui">
  <span>점수: <b id="sc">0</b></span>
  <span>레벨: <b id="lv">1</b></span>
  <span>속도: <b id="sp">1.0</b>x</span>
  <span>❤ <b id="lf">3</b></span>
</div>
<div id="wrap">
  <canvas id="gameCanvas" width="480" height="240"></canvas>
  <div id="overlay">
    <h2>🏃 진화 러너</h2>
    <p>스페이스바 / 위 방향키로 점프<br>더블 점프 가능<br>시간이 지날수록 점점 빨라집니다!</p>
    <button id="startBtn">게임 시작</button>
  </div>
</div>
<script>
(function(){
  const cv=document.getElementById('gameCanvas');
  const cx=cv.getContext('2d');
  const W=480,H=240;
  const ov=document.getElementById('overlay');
  const scEl=document.getElementById('sc');
  const lvEl=document.getElementById('lv');
  const spEl=document.getElementById('sp');
  const lfEl=document.getElementById('lf');
  const btn=document.getElementById('startBtn');
  let AC=null;
  function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
  function beep(freq,type,t0,dur,vol){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.type=type||'sine';o.frequency.value=freq;const n=ac.currentTime+t0;g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(vol||0.1,n+0.015);g.gain.linearRampToValueAtTime(0,n+dur);o.connect(g);g.connect(ac.destination);o.start(n);o.stop(n+dur+0.02);}catch(e){}}
  function sfxJump(){beep(440,'sine',0,0.1,0.08);beep(660,'sine',0.06,0.07,0.05);}
  function sfxHit(){beep(150,'sawtooth',0,0.3,0.15);beep(80,'sine',0,0.4,0.1);}
  function sfxScore(){beep(660,'sine',0,0.06,0.07);beep(880,'sine',0.06,0.06,0.05);}
  let bgmId=null,bgmBeat=0,bgmOn=false;
  function doBeat(){try{const ac=getAC(),s=60/140;const bass=[55,55,73.42,55][bgmBeat%4];beep(bass,'sawtooth',0,s*1.8,0.12);bgmBeat++;}catch(e){}}
  function startBGM(){if(bgmOn)return;bgmOn=true;bgmBeat=0;doBeat();bgmId=setInterval(doBeat,60000/140);}
  function stopBGM(){if(bgmId){clearInterval(bgmId);bgmId=null;}bgmOn=false;}
  function gameoverSFX(){stopBGM();[330,294,262,220].forEach((f,i)=>beep(f,'sawtooth',i*0.2,0.3,0.1));}
  let S,rafId,rafRunning=false;
  const GY=185,GRAVITY=0.55,JUMP_V=-11,PW=28,PH=36;
  function newState(){return{px:60,py:GY,vy:0,onGround:true,jumps:0,obstacles:[],particles:[],score:0,lives:3,speed:1,frame:0,invincible:0,obstCD:80,keys:{},running:false,over:false,stars:Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*(H*0.65),s:Math.random()*1.5+0.3,sp:Math.random()*0.3+0.05,tw:Math.random()*6.28}))};}
  S=newState();
  function jump(){if(S.jumps<2){S.vy=JUMP_V;S.onGround=false;S.jumps++;sfxJump();}}
  function drawPlayer(){
    const f=S.frame;
    const lg=S.onGround?Math.sin(f*0.4)*5:0;
    cx.save();cx.translate(S.px+PW/2,S.py);
    if(S.onGround){cx.fillStyle='rgba(0,0,0,0.3)';cx.beginPath();cx.ellipse(0,PH+2,12,4,0,0,Math.PI*2);cx.fill();}
    cx.fillStyle='#1565c0';cx.fillRect(-10,-2,20,22);
    cx.fillStyle='#1976d2';cx.fillRect(-10,-2,10,22);
    cx.fillStyle='#ffcc80';cx.beginPath();cx.ellipse(0,-10,9,10,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#5d4037';cx.fillRect(-9,-20,18,10);cx.beginPath();cx.arc(0,-20,9,Math.PI,0);cx.fill();
    cx.fillStyle='#333';cx.beginPath();cx.arc(3,-11,2,0,Math.PI*2);cx.fill();
    cx.fillStyle='white';cx.beginPath();cx.arc(4,-12,0.8,0,Math.PI*2);cx.fill();
    cx.fillStyle='#0d47a1';cx.fillRect(-8,20,8,14+lg);cx.fillRect(0,20,8,14-lg);
    cx.fillStyle='#f44336';cx.fillRect(-9,34+lg,10,5);cx.fillRect(1,34-lg,10,5);
    cx.fillStyle='#1565c0';cx.fillRect(-16,0,6,14-lg*0.5);cx.fillRect(10,0,6,14+lg*0.5);
    cx.restore();
  }
  function spawnObstacle(){
    const types=[{w:18,h:34,col:'#e53935',col2:'#c62828',pts:10},{w:28,h:22,col:'#7b1fa2',col2:'#6a1b9a',pts:15},{w:14,h:48,col:'#f57f17',col2:'#e65100',pts:20}];
    const t=types[Math.floor(Math.random()*types.length)];
    S.obstacles.push({x:W+10,y:GY+PH-t.h,w:t.w,h:t.h,col:t.col,col2:t.col2,pts:t.pts,passed:false});
  }
  function drawObstacle(ob){cx.fillStyle=ob.col2;cx.fillRect(ob.x+3,ob.y+3,ob.w,ob.h);cx.fillStyle=ob.col;cx.fillRect(ob.x,ob.y,ob.w,ob.h);cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(ob.x+2,ob.y+2,ob.w*0.4,ob.h*0.3);}
  function spawnFX(x,y,col,n){for(let i=0;i<(n||10);i++){const a=Math.random()*6.28,sp=Math.random()*4+1;S.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:30,col});}}
  function drawBG(){
    const grd=cx.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#050520');grd.addColorStop(0.6,'#0a0a2a');grd.addColorStop(1,'#1a1a3a');cx.fillStyle=grd;cx.fillRect(0,0,W,H);
    S.stars.forEach(s=>{s.tw+=0.02;const alpha=0.2+Math.sin(s.tw)*0.2;cx.fillStyle='rgba(255,255,255,'+alpha+')';cx.fillRect(s.x,s.y,s.s,s.s);});
    const grdG=cx.createLinearGradient(0,GY+PH,0,H);grdG.addColorStop(0,'#2e7d32');grdG.addColorStop(0.3,'#1b5e20');grdG.addColorStop(1,'#0a2e0d');cx.fillStyle=grdG;cx.fillRect(0,GY+PH,W,H-(GY+PH));
    cx.strokeStyle='#43a047';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,GY+PH);cx.lineTo(W,GY+PH);cx.stroke();
    cx.strokeStyle='rgba(67,160,71,0.3)';cx.lineWidth=0.5;const offset=(S.frame*S.speed*2)%40;for(let x=-offset;x<W;x+=40){cx.beginPath();cx.moveTo(x,GY+PH);cx.lineTo(x,H);cx.stroke();}
  }
  function update(){
    if(!S.running)return;
    S.frame++;
    S.vy+=GRAVITY;S.py+=S.vy;
    if(S.py>=GY){S.py=GY;S.vy=0;S.onGround=true;S.jumps=0;}
    S.speed=1+S.score*0.0008;if(S.speed>4)S.speed=4;
    const level=Math.floor(S.score/200)+1;
    S.obstCD--;
    if(S.obstCD<=0){spawnObstacle();S.obstCD=Math.max(35,90-level*5)+Math.floor(Math.random()*30);}
    S.obstacles=S.obstacles.filter(ob=>{
      ob.x-=S.speed*3;
      if(!ob.passed&&ob.x+ob.w<S.px){ob.passed=true;S.score+=ob.pts;sfxScore();}
      if(S.invincible<=0&&ob.x<S.px+PW-4&&ob.x+ob.w>S.px+4&&ob.y<S.py+PH-4&&ob.y+ob.h>S.py+4){S.lives--;S.invincible=60;spawnFX(S.px+PW/2,S.py+PH/2,'#ef9a9a',15);sfxHit();if(S.lives<=0){S.running=false;S.over=true;gameoverSFX();}return true;}
      return ob.x>-100;
    });
    if(S.invincible>0)S.invincible--;
    S.stars.forEach(s=>{s.x-=s.sp*S.speed;if(s.x<0)s.x=W+Math.random()*10;});
    S.particles=S.particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;return p.life>0;});
    scEl.textContent=S.score;lvEl.textContent=level;spEl.textContent=S.speed.toFixed(1);lfEl.textContent=S.lives;
  }
  function draw(){
    drawBG();
    S.obstacles.forEach(ob=>drawObstacle(ob));
    if(!S.invincible||Math.floor(S.invincible/5)%2===0)drawPlayer();
    S.particles.forEach(p=>{cx.globalAlpha=p.life/30;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,3,0,Math.PI*2);cx.fill();cx.globalAlpha=1;});
    if(S.over){
      cx.fillStyle='rgba(0,0,0,0.8)';cx.fillRect(0,0,W,H);
      cx.fillStyle='#ff1744';cx.font='bold 30px sans-serif';cx.textAlign='center';cx.fillText('GAME OVER',W/2,H/2-40);
      cx.fillStyle='white';cx.font='400 16px sans-serif';cx.fillText('최종 점수: '+S.score,W/2,H/2);
      cx.fillStyle='rgba(255,255,255,0.5)';cx.font='400 13px sans-serif';cx.fillText('화면을 클릭해 다시 시작',W/2,H/2+30);
      cx.fillStyle='rgba(255,255,255,0.12)';cx.strokeStyle='rgba(255,255,255,0.3)';cx.lineWidth=1;
      const bw=140,bh=34,bx=W/2-70,by=H/2+50;
      if(cx.roundRect){cx.beginPath();cx.roundRect(bx,by,bw,bh,8);cx.fill();cx.stroke();}
      else{cx.fillRect(bx,by,bw,bh);cx.strokeRect(bx,by,bw,bh);}
      cx.fillStyle='rgba(255,255,255,0.7)';cx.font='400 13px sans-serif';cx.fillText('← 메인으로',W/2,by+22);
    }
  }
  function loop(){update();draw();rafId=requestAnimationFrame(loop);}
  btn.addEventListener('click',()=>{S=newState();S.running=true;ov.style.display='none';if(!rafRunning){rafRunning=true;loop();}startBGM();});
  cv.addEventListener('click',(e)=>{
    if(S.over){
      const rect=cv.getBoundingClientRect();
      const mx=(e.clientX-rect.left)*(W/rect.width);
      const my=(e.clientY-rect.top)*(H/rect.height);
      const bw=140,bh=34,bx=W/2-70,by=H/2+50;
      if(mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh){window.location.href='index.html';return;}
      S=newState();S.running=true;startBGM();
    }
  });
  document.addEventListener('keydown',e=>{if(S.keys)S.keys[e.key]=true;if((e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W')&&S.running&&!S.over){jump();e.preventDefault();}if([' ','ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();});
  document.addEventListener('keyup',e=>{if(S.keys)delete S.keys[e.key];});
  loop();
})();
</script>
</body>
</html>
