<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진화 러너 게임</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; font-family:sans-serif; padding:12px; }
h1 { font-size:20px; font-weight:700; text-align:center; margin-bottom:12px; color:#eee; letter-spacing:2px; }
#gc { width:100%; max-width:680px; background:#111; border-radius:16px; padding:16px; box-shadow:0 4px 32px rgba(0,0,0,0.6); }
#cv { width:100%; height:220px; display:block; cursor:pointer; border-radius:12px; border:1px solid #333; }
#ui { display:flex; justify-content:space-between; align-items:center; padding:8px 4px 2px; }
#sc { font-size:17px; font-weight:600; color:#eee; }
#hs { font-size:13px; color:#aaa; }
#musicBtn { font-size:12px; color:#aaa; cursor:pointer; border:1px solid #444; border-radius:999px; padding:4px 12px; background:#222; }
#musicBtn:hover { background:#333; }
#eb { width:100%; height:7px; background:#333; border-radius:999px; margin:6px 0 2px; overflow:hidden; }
#ef { height:100%; width:0%; border-radius:999px; background:#f4a460; transition:width 0.2s; }
#el { font-size:12px; color:#888; padding:0 4px 4px; display:flex; justify-content:space-between; }
</style>
</head>
<body>
<div id="gc">
  <h1>⚔️ 진화 러너 ⚔️</h1>
  <canvas id="cv"></canvas>
  <div id="ui">
    <div id="sc">점수: 0</div>
    <button id="musicBtn">🔊 음악 끄기</button>
    <div id="hs">최고: 0</div>
  </div>
  <div id="eb"><div id="ef"></div></div>
  <div id="el"><span id="en">🥚 알</span><span id="nx">500점에 진화!</span></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
<script>
var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function rsz(){cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;} rsz();
function GR(){return cv.height-42;}
var EVOS=[
  {name:'🥚 알',th:0,barCol:'#e8d090'},{name:'🐣 아기새',th:500,barCol:'#f4d080'},
  {name:'🐱 아기 고양이',th:1000,barCol:'#f4a460'},{name:'🐯 호랑이',th:1500,barCol:'#e8832a'},
  {name:'🦁 사자왕',th:2000,barCol:'#d4a017'},{name:'🐲 드래곤',th:2500,barCol:'#5a9e6f'},
  {name:'🔥 불꽃 드래곤',th:3000,barCol:'#cc4422'},{name:'🌊 바다의 신',th:3500,barCol:'#2266cc'},
  {name:'⚡ 번개 군주',th:4000,barCol:'#cccc00'},{name:'✨ 우주의 수호자',th:4500,barCol:'#8844cc'},
];
var OBS_TYPES=['skull','demon','ghost','spike','eye'];
var G=0.58,JF=-13,state='idle',score=0,hiScore=0,frame=0,spd=4;
var evoLv=0,evoAnim=0,nextOb=90;
var cat={x:80,y:0,vy:0,w:44,h:44,ground:true,lp:0,wp:0};
var obs=[],clouds=[{x:200,y:28,s:1},{x:470,y:48,s:0.7}],parts=[];

// MUSIC
var musicOn=true,musicReady=false;
var synth,bassSynth,kick,snare,hihat,seq,bassSeq,drumSeq,hihatSeq,melodyIdx=0;
var MN=[['C5','E5','G5','E5','C5','G4','A4','C5'],['D5','F5','A5','F5','D5','A4','B4','D5'],['E5','G5','B5','G5','E5','B4','C5','E5'],['G5','B5','D6','B5','G5','D5','E5','G5'],['A5','C6','E6','C6','A5','E5','F5','A5']];
var BL=[['C3','C3','G3','G3','A3','A3','F3','F3'],['D3','D3','A3','A3','B3','B3','G3','G3'],['E3','E3','B3','B3','C4','C4','A3','A3'],['G3','G3','D4','D4','E4','E4','C4','C4'],['A3','A3','E4','E4','F4','F4','D4','D4']];
function setupAudio(){try{synth=new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:0.02,decay:0.1,sustain:0.4,release:0.3},volume:-8}).toDestination();bassSynth=new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:0.05,decay:0.2,sustain:0.5,release:0.4},volume:-14}).toDestination();kick=new Tone.MembraneSynth({volume:-10}).toDestination();snare=new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:0.001,decay:0.12,sustain:0,release:0.05},volume:-16}).toDestination();hihat=new Tone.MetalSynth({frequency:400,envelope:{attack:0.001,decay:0.05,release:0.01},harmonicity:5.1,modulationIndex:32,resonance:4000,octaves:1.5,volume:-22}).toDestination();musicReady=true;}catch(e){musicReady=false;}}
function stopAll(){try{Tone.Transport.stop();Tone.Transport.cancel();}catch(e){}try{if(seq){seq.dispose();seq=null;}}catch(e){}try{if(bassSeq){bassSeq.dispose();bassSeq=null;}}catch(e){}try{if(drumSeq){drumSeq.dispose();drumSeq=null;}}catch(e){}try{if(hihatSeq){hihatSeq.dispose();hihatSeq=null;}}catch(e){}}
function playBgm(){if(!musicReady||!musicOn)return;try{stopAll();seq=new Tone.Sequence(function(t,n){synth.triggerAttackRelease(n,'8n',t);},MN[melodyIdx],'8n');bassSeq=new Tone.Sequence(function(t,n){bassSynth.triggerAttackRelease(n,'4n',t);},BL[melodyIdx],'4n');drumSeq=new Tone.Sequence(function(t,i){if(i===0||i===2)kick.triggerAttackRelease('C1','8n',t);if(i===1||i===3)snare.triggerAttackRelease('8n',t);},[0,1,2,3],'4n');hihatSeq=new Tone.Sequence(function(t){hihat.triggerAttackRelease('32n',t);},[0,1,2,3,4,5,6,7],'8n');seq.start(0);bassSeq.start(0);drumSeq.start(0);hihatSeq.start(0);Tone.Transport.bpm.value=120+melodyIdx*10;Tone.Transport.start();}catch(e){}}
function playGameOver(){if(!musicReady||!musicOn)return;try{stopAll();var now=Tone.now()+0.1;['C5','B4','A4','G4','F4','E4','D4','C4'].forEach(function(n,i){synth.triggerAttackRelease(n,'8n',now+i*0.35);bassSynth.triggerAttackRelease(n.replace('5','3').replace('4','2'),'4n',now+i*0.35);});}catch(e){}}
document.getElementById('musicBtn').addEventListener('click',function(e){e.stopPropagation();musicOn=!musicOn;document.getElementById('musicBtn').textContent=musicOn?'🔊 음악 끄기':'🔇 음악 켜기';if(musicOn){if(state==='running')playBgm();}else stopAll();});

function updEvoUI(){var e=EVOS[evoLv],nx=EVOS[evoLv+1];document.getElementById('ef').style.background=e.barCol;document.getElementById('en').textContent=e.name;if(nx){var p=(score-e.th)/(nx.th-e.th)*100;document.getElementById('ef').style.width=Math.min(100,Math.max(0,p))+'%';document.getElementById('nx').textContent=nx.th+'점에 진화!';}else{document.getElementById('ef').style.width='100%';document.getElementById('nx').textContent='🏆 최강 단계!';}}
function chkEvo(){var lv=0;for(var i=EVOS.length-1;i>=0;i--){if(score>=EVOS[i].th){lv=i;break;}}if(lv!==evoLv){evoLv=lv;evoAnim=40;burstParts();var ni=Math.min(Math.floor(evoLv/2),4);if(ni!==melodyIdx){melodyIdx=ni;if(state==='running')playBgm();}}updEvoUI();}
function burstParts(){for(var i=0;i<24;i++){var c=['#ffd700','#ff88ff','#88ffff','#ff8844','#fff'];parts.push({x:cat.x+cat.w/2,y:cat.y+cat.h/2,vx:(Math.random()-0.5)*10,vy:(Math.random()-1.8)*8,r:3+Math.random()*5,life:1,col:c[Math.floor(Math.random()*c.length)]});}}

// OBSTACLES
function drawObs(o){ctx.save();if(o.type==='skull')drawSkull(o);else if(o.type==='demon')drawDemon(o);else if(o.type==='ghost')drawGhost(o);else if(o.type==='spike')drawSpike(o);else drawEye(o);ctx.restore();}
function drawSkull(o){o.ph=(o.ph||0)+0.05;var x=o.x,y=o.y,w=o.w,h=o.h,bob=Math.sin(o.ph)*2;ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(x+w/2,GR()+6,w*0.45,4,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#bbb';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x+2,y+h+bob);ctx.lineTo(x+w-2,y+h+bob);ctx.stroke();ctx.beginPath();ctx.moveTo(x+w*0.3,y+h*0.85+bob);ctx.lineTo(x+w*0.3,y+h+bob);ctx.stroke();ctx.beginPath();ctx.moveTo(x+w*0.7,y+h*0.85+bob);ctx.lineTo(x+w*0.7,y+h+bob);ctx.stroke();ctx.fillStyle='#e8e8e8';ctx.beginPath();ctx.ellipse(x+w/2,y+h*0.42+bob,w*0.44,h*0.44,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#999';ctx.lineWidth=1;ctx.stroke();ctx.fillStyle='#ddd';ctx.beginPath();ctx.ellipse(x+w/2,y+h*0.76+bob,w*0.3,h*0.18,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222';ctx.beginPath();ctx.ellipse(x+w*0.33,y+h*0.38+bob,w*0.11,h*0.13,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+w*0.67,y+h*0.38+bob,w*0.11,h*0.13,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff2200';ctx.beginPath();ctx.arc(x+w*0.33,y+h*0.38+bob,w*0.05,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+w*0.67,y+h*0.38+bob,w*0.05,0,Math.PI*2);ctx.fill();ctx.fillStyle='#555';ctx.beginPath();ctx.ellipse(x+w*0.43,y+h*0.55+bob,w*0.05,h*0.06,0.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+w*0.57,y+h*0.55+bob,w*0.05,h*0.06,-0.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';for(var i=0;i<4;i++){ctx.fillRect(x+w*(0.28+i*0.12),y+h*0.68+bob,w*0.08,h*0.1);}ctx.strokeStyle='#bbb';ctx.lineWidth=0.5;for(var i=0;i<4;i++){ctx.strokeRect(x+w*(0.28+i*0.12),y+h*0.68+bob,w*0.08,h*0.1);}}
function drawDemon(o){o.ph=(o.ph||0)+0.08;var x=o.x,y=o.y,w=o.w,h=o.h,flap=Math.sin(o.ph)*8;ctx.fillStyle='#880000';ctx.beginPath();ctx.moveTo(x+w*0.3,y+h*0.35);ctx.quadraticCurveTo(x-20,y+h*0.1+flap,x-5,y+h*0.7);ctx.lineTo(x+w*0.2,y+h*0.55);ctx.fill();ctx.beginPath();ctx.moveTo(x+w*0.7,y+h*0.35);ctx.quadraticCurveTo(x+w+20,y+h*0.1+flap,x+w+5,y+h*0.7);ctx.lineTo(x+w*0.8,y+h*0.55);ctx.fill();ctx.strokeStyle='#550000';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x+w*0.3,y+h*0.35);ctx.lineTo(x-18,y+h*0.12+flap);ctx.stroke();ctx.beginPath();ctx.moveTo(x+w*0.7,y+h*0.35);ctx.lineTo(x+w+18,y+h*0.12+flap);ctx.stroke();ctx.strokeStyle='#aa0000';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x+w*0.5,y+h);ctx.quadraticCurveTo(x+w*0.7,y+h*1.1,x+w*0.55,y+h*1.2);ctx.stroke();ctx.fillStyle='#ff2200';ctx.beginPath();ctx.moveTo(x+w*0.52,y+h*1.18);ctx.lineTo(x+w*0.44,y+h*1.28);ctx.lineTo(x+w*0.6,y+h*1.28);ctx.fill();ctx.fillStyle='#cc2200';ctx.beginPath();ctx.ellipse(x+w/2,y+h*0.62,w*0.38,h*0.35,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#dd2200';ctx.beginPath();ctx.ellipse(x+w/2,y+h*0.3,w*0.36,h*0.3,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.moveTo(x+w*0.3,y+h*0.1);ctx.lineTo(x+w*0.22,y-h*0.1);ctx.lineTo(x+w*0.38,y+h*0.14);ctx.fill();ctx.beginPath();ctx.moveTo(x+w*0.7,y+h*0.1);ctx.lineTo(x+w*0.78,y-h*0.1);ctx.lineTo(x+w*0.62,y+h*0.14);ctx.fill();ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.ellipse(x+w*0.37,y+h*0.27,6,5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+w*0.63,y+h*0.27,6,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(x+w*0.37,y+h*0.27,2,4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+w*0.63,y+h*0.27,2,4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(x+w*0.32,y+h*0.4);ctx.quadraticCurveTo(x+w*0.5,y+h*0.52,x+w*0.68,y+h*0.4);ctx.lineTo(x+w*0.65,y+h*0.43);ctx.lineTo(x+w*0.58,y+h*0.38);ctx.lineTo(x+w*0.5,y+h*0.45);ctx.lineTo(x+w*0.42,y+h*0.38);ctx.lineTo(x+w*0.35,y+h*0.43);ctx.closePath();ctx.fill();}
function drawGhost(o){o.ph=(o.ph||0)+0.06;var x=o.x,y=o.y,w=o.w,h=o.h,float=Math.sin(o.ph)*5;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.beginPath();ctx.ellipse(x+w/2,GR()+5,w*0.3,3,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=0.88;ctx.fillStyle='#ddeeff';ctx.beginPath();ctx.arc(x+w/2,y+h*0.3+float,w*0.42,Math.PI,0);ctx.lineTo(x+w*0.92,y+h*0.82+float);for(var i=0;i<4;i++){var cx1=x+w*(0.92-i/4*0.92)+w*0.12;var cx2=x+w*(0.92-(i+0.5)/4*0.92);ctx.quadraticCurveTo(cx1,y+h*(0.92+0.08*(i%2===0?1:-1))+float,cx2,y+h*0.82+float);}ctx.lineTo(x+w*0.08,y+h*0.82+float);ctx.closePath();ctx.fill();ctx.strokeStyle='#aaccee';ctx.lineWidth=1.5;ctx.stroke();ctx.globalAlpha=1;ctx.fillStyle='#1a3355';ctx.beginPath();ctx.ellipse(x+w*0.36,y+h*0.28+float,w*0.1,h*0.12,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+w*0.64,y+h*0.28+float,w*0.1,h*0.12,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#88ccff';ctx.beginPath();ctx.arc(x+w*0.36,y+h*0.26+float,w*0.04,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+w*0.64,y+h*0.26+float,w*0.04,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a3355';ctx.beginPath();ctx.ellipse(x+w*0.5,y+h*0.42+float,w*0.1,h*0.09,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=0.4;ctx.fillStyle='#cce8ff';ctx.beginPath();ctx.arc(x-8,y+h*0.5+Math.sin(o.ph*1.3)*6,6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+w+6,y+h*0.4+Math.sin(o.ph*0.9)*7,5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
function drawSpike(o){o.ph=(o.ph||0)+0.1;var x=o.x,y=o.y,w=o.w,h=o.h;ctx.fillStyle='rgba(150,0,0,0.35)';ctx.beginPath();ctx.ellipse(x+w/2,GR()+4,w*0.55,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#333';ctx.fillRect(x,y+h*0.8,w,h*0.2);ctx.fillStyle='#555';ctx.fillRect(x+2,y+h*0.8,w-4,h*0.06);for(var i=0;i<5;i++){var sx=x+w*(i/4);var sh=h*(0.55+Math.sin(i*1.3)*0.12);ctx.fillStyle='#cc0000';ctx.beginPath();ctx.moveTo(sx-w*0.07,y+h*0.8);ctx.lineTo(sx,y+h*0.8-sh);ctx.lineTo(sx+w*0.07,y+h*0.8);ctx.fill();ctx.strokeStyle='#880000';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx-w*0.07,y+h*0.8);ctx.lineTo(sx,y+h*0.8-sh);ctx.lineTo(sx+w*0.07,y+h*0.8);ctx.stroke();ctx.fillStyle='#ffaaaa';ctx.beginPath();ctx.arc(sx,y+h*0.8-sh,2,0,Math.PI*2);ctx.fill();if(i%2===0){ctx.fillStyle='rgba(200,0,0,0.7)';ctx.beginPath();ctx.arc(sx+2,y+h*0.8-sh*0.4+Math.sin(o.ph+i)*6,3,0,Math.PI*2);ctx.fill();}}if(Math.sin(o.ph*3)>0.7){ctx.strokeStyle='rgba(255,0,0,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(x+w/2,y+h*0.5,w*0.55,h*0.45,0,0,Math.PI*2);ctx.stroke();}}
function drawEye(o){o.ph=(o.ph||0)+0.07;var x=o.x,y=o.y,w=o.w,h=o.h,float=Math.sin(o.ph)*4;ctx.strokeStyle='#440066';ctx.lineWidth=3;ctx.lineCap='round';for(var i=0;i<6;i++){var ang=-Math.PI*0.8+i/5*Math.PI*1.6;var len=h*(0.25+Math.sin(o.ph+i)*0.1);ctx.beginPath();ctx.moveTo(x+w/2,y+h*0.62+float);ctx.quadraticCurveTo(x+w/2+Math.cos(ang)*len*0.6+Math.sin(o.ph+i)*8,y+h*0.62+float+Math.sin(ang)*len*0.6,x+w/2+Math.cos(ang)*len,y+h*0.62+float+Math.sin(ang)*len);ctx.stroke();ctx.fillStyle='#ff2200';ctx.beginPath();ctx.arc(x+w/2+Math.cos(ang)*len,y+h*0.62+float+Math.sin(ang)*len,3,0,Math.PI*2);ctx.fill();}var grad=ctx.createRadialGradient(x+w*0.42,y+h*0.32+float,2,x+w/2,y+h*0.4+float,w*0.42);grad.addColorStop(0,'#cc44ff');grad.addColorStop(0.6,'#660099');grad.addColorStop(1,'#330044');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x+w/2,y+h*0.4+float,w*0.42,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#aa22ee';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x+w/2,y+h*0.38+float,w*0.28,h*0.28,0,0,Math.PI*2);ctx.fill();var px=x+w/2+Math.cos(o.ph*0.4)*w*0.06;var py=y+h*0.38+float+Math.sin(o.ph*0.4)*h*0.06;ctx.fillStyle='#ff4400';ctx.beginPath();ctx.ellipse(px,py,w*0.17,h*0.19,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(px,py,w*0.08,h*0.13,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.ellipse(px-w*0.04,py-h*0.05,w*0.04,h*0.04,0,0,Math.PI*2);ctx.fill();[[0.18,0.28],[0.78,0.32],[0.5,0.08]].forEach(function(a,i){var ex=x+w*a[0]+Math.sin(o.ph+i)*3;var ey=y+h*a[1]+float+Math.cos(o.ph+i)*3;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex,ey,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff2200';ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.arc(ex,ey,1.5,0,Math.PI*2);ctx.fill();});}

// CHARACTERS

function drawEgg(x,y,w,h){if(evoAnim>0){ctx.beginPath();ctx.arc(x+w/2,y+h/2,(evoAnim/40)*24,0,Math.PI*2);ctx.fillStyle='#ffe08844';ctx.fill();evoAnim--;}ctx.fillStyle='#f5ead0';ctx.beginPath();ctx.ellipse(x+w/2,y+h*0.55,w*0.38,h*0.46,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#c8a860';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(x+w/2,y+h*0.55,w*0.38,h*0.46,0,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='#b09050';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+w*0.45,y+h*0.25);ctx.lineTo(x+w*0.5,y+h*0.35);ctx.lineTo(x+w*0.42,y+h*0.42);ctx.stroke();ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(x+w*0.7,y+h*0.2,2,0,Math.PI*2);ctx.fill();}

function drawCosmic(x,y,w,h){cat.lp+=cat.ground?0.22:0;cat.wp+=0.1;if(evoAnim>0){ctx.beginPath();ctx.arc(x+w/2,y+h/2,(evoAnim/40)*36,0,Math.PI*2);ctx.fillStyle='#cc88ff44';ctx.fill();evoAnim--;}var bc='#7733bb',dc='#441188',ac='#cc88ff';for(var ai=0;ai<3;ai++){ctx.beginPath();ctx.arc(x+w/2,y+h/2,(w*0.65+ai*10)+Math.sin(frame*0.07+ai*1.2)*5,0,Math.PI*2);ctx.strokeStyle=ac+(ai===0?'44':ai===1?'33':'22');ctx.lineWidth=3;ctx.stroke();}var wy=Math.sin(cat.wp)*9;ctx.globalAlpha=0.85;ctx.fillStyle=ac;ctx.beginPath();ctx.moveTo(x+w*0.35,y+h*0.42);ctx.quadraticCurveTo(x-24,y+wy,x-4,y+h*0.74);ctx.lineTo(x+w*0.28,y+h*0.58);ctx.fill();ctx.beginPath();ctx.moveTo(x+w*0.65,y+h*0.42);ctx.quadraticCurveTo(x+w+24,y+wy,x+w+4,y+h*0.74);ctx.lineTo(x+w*0.72,y+h*0.58);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle=bc;var bx=x,by=y+h*0.35,bw=w,bh=h*0.6,r=10;ctx.beginPath();ctx.moveTo(bx+r,by);ctx.lineTo(bx+bw-r,by);ctx.arc(bx+bw-r,by+r,r,-Math.PI/2,0);ctx.lineTo(bx+bw,by+bh-r);ctx.arc(bx+bw-r,by+bh-r,r,0,Math.PI/2);ctx.lineTo(bx+r,by+bh);ctx.arc(bx+r,by+bh-r,r,Math.PI/2,Math.PI);ctx.lineTo(bx,by+r);ctx.arc(bx+r,by+r,r,Math.PI,-Math.PI/2);ctx.closePath();ctx.fill();ctx.fillStyle=bc;ctx.beginPath();ctx.ellipse(x+w*0.5,y+h*0.22,w*0.36,h*0.25,0,0,Math.PI*2);ctx.fill();[[0.5,-0.2],[0.36,-0.15],[0.64,-0.15],[0.24,-0.06],[0.76,-0.06]].forEach(function(a,i){ctx.fillStyle=i===0?'#fff':i<3?ac:'#ee66ff';ctx.beginPath();ctx.moveTo(x+w*a[0],y+h*0.08);ctx.lineTo(x+w*(a[0]-0.04),y+h*a[1]);ctx.lineTo(x+w*(a[0]+0.04),y+h*a[1]);ctx.fill();});ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x+w*0.37,y+h*0.2,5,4.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+w*0.63,y+h*0.2,5,4.5,0,0,Math.PI*2);ctx.fill();var ea=frame*0.06;ctx.fillStyle=ac;ctx.beginPath();ctx.arc(x+w*0.37+Math.cos(ea)*2,y+h*0.2+Math.sin(ea)*1.5,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+w*0.63+Math.cos(ea+Math.PI)*2,y+h*0.2+Math.sin(ea+Math.PI)*1.5,2.5,0,Math.PI*2);ctx.fill();ctx.strokeStyle=ac;ctx.lineWidth=3;ctx.lineCap='ro function drawBg(){var sc=['#ddeffd','#ffe8aa','#ffddc8','#ffe4cc','#fff8cc','#d8f8e8','#ffe0d8','#d0e8ff','#ffffcc','#f0e0ff'];ctx.fillStyle=sc[Math.min(evoLv,sc.length-1)];ctx.fillRect(0,0,cv.width,GR()+4);ctx.fillStyle='#7ab648';ctx.fillRect(0,GR()+4,cv.width,8);ctx.fillStyle='#5a9628';ctx.fillRect(0,GR()+12,cv.width,cv.height-GR()-12);}
function drawCloud(c){ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.arc(c.x,c.y,20*c.s,0,Math.PI*2);ctx.arc(c.x+22*c.s,c.y-8*c.s,15*c.s,0,Math.PI*2);ctx.arc(c.x+40*c.s,c.y,18*c.s,0,Math.PI*2);ctx.fill();}
function drawParts(){parts.forEach(function(p){ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}
function drawOverlay(){ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,cv.width,cv.height);ctx.fillStyle='#eee';ctx.textAlign='center';if(state==='idle'){ctx.font='600 20px sans-serif';ctx.fillText('⚔️ 탭 / 스페이스로 시작!',cv.width/2,cv.height/2-10);ctx.font='400 13px sans-serif';ctx.fillStyle='#aaa';ctx.fillText('500점마다 캐릭터가 진화해요 (총 10단계) 🎵',cv.width/2,cv.height/2+16);}else if(state==='over'){ctx.font='600 20px sans-serif';ctx.fillText('💀 게임 오버!',cv.width/2,cv.height/2-16);ctx.font='400 13px sans-serif';ctx.fillStyle='#aaa';ctx.fillText('점수: '+score+'  |  '+EVOS[evoLv].name,cv.width/2,cv.height/2+8);ctx.fillText('탭 / 스페이스로 다시 시작',cv.width/2,cv.height/2+30);}}
function hits(a,b){var p=5;return a.x+p<b.x+b.w&&a.x+a.w-p>b.x&&a.y+p<b.y+b.h&&a.y+a.h-p>b.y;}
function resetGame(){score=0;frame=0;spd=4;evoLv=0;evoAnim=0;nextOb=90;melodyIdx=0;cat.y=GR()-cat.h;cat.vy=0;cat.ground=true;cat.lp=0;cat.wp=0;obs=[];parts=[];clouds=[{x:200,y:28,s:1},{x:470,y:48,s:0.7}];document.getElementById('sc').textContent='점수: 0';updEvoUI();}
function update(){if(state!=='running')return;frame++;score=Math.floor(frame/6);spd=4+Math.floor(score/300)*0.3;document.getElementById('sc').textContent='점수: '+score;chkEvo();cat.vy+=G;cat.y+=cat.vy;if(cat.y>=GR()-cat.h){cat.y=GR()-cat.h;cat.vy=0;cat.ground=true;}clouds.forEach(function(c){c.x-=0.5;if(c.x<-80)c.x=cv.width+80;});if(frame>=nextOb){var type=OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];var isFlying=(type==='ghost'||type==='demon'||(type==='eye'&&Math.random()>0.5));var h2=32+Math.random()*18;var y2=isFlying?GR()-h2-30-Math.random()*20:GR()-h2;var w2=type==='spike'?38:28+Math.random()*10;obs.push({x:cv.width+20,y:y2,w:w2,h:h2,type:type,ph:0});nextOb=frame+55+Math.floor(Math.random()*50);}obs.forEach(function(o){o.x-=spd;});obs=obs.filter(function(o){return o.x>-80;});parts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=0.03;});parts=parts.filter(function(p){return p.life>0;});for(var i=0;i<obs.length;i++){if(hits(cat,obs[i])){state='over';if(score>hiScore){hiScore=score;document.getElementById('hs').textContent='최고: '+hiScore;}burstParts();playGameOver();return;}}}
function draw(){ctx.clearRect(0,0,cv.width,cv.height);drawBg();clouds.forEach(drawCloud);drawParts();obs.forEach(drawObs);drawChar(cat.x,cat.y,cat.w,cat.h);if(state!=='running')drawOverlay();}
function handleInput(){if(state==='idle'||state==='over'){resetGame();state='running';Tone.start().then(function(){setupAudio();playBgm();}).catch(function(){});}else if(state==='running'&&cat.ground){cat.vy=JF;cat.ground=false;}}
cv.addEventListener('click',handleInput);
cv.addEventListener('touchstart',function(e){e.preventDefault();handleInput();},{passive:false});
document.addEventListener('keydown',function(e){if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handleInput();}});
window.addEventListener('resize',rsz);
(function loop(){update();draw();requestAnimationFrame(loop);})();
